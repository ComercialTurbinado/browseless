services:
  browserless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      CONCURRENT: 10
      TOKEN: ${BROWSERLESS_TOKEN:-browseless-local-token}
      MAX_QUEUE_LENGTH: 50
      CONNECTION_TIMEOUT: 60000
      ENABLE_DEBUG_VIEWER: "false"
    restart: unless-stopped

  capture-service:
    build: ./capture-service
    environment:
      BROWSERLESS_WS_URL: ws://browserless:3000?token=${BROWSERLESS_TOKEN:-browseless-local-token}
      PORT: 4000
    depends_on:
      - browserless
    restart: unless-stopped
