services:
  browseless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      CONCURRENT: 10
      TOKEN: ${BROWSERLESS_TOKEN:-browseless-local-token}
      MAX_QUEUE_LENGTH: 50
      CONNECTION_TIMEOUT: 60000
      # Sessão pode durar até 15 min (156 frames a ~3s + pausas). Default do Browserless é 30s e mata a página.
      TIMEOUT: 900000
      ENABLE_DEBUG_VIEWER: "false"
    restart: unless-stopped

  capture-service:
    build: ./capture-service
    environment:
      BROWSERLESS_WS_URL: ws://browseless:3000?token=${BROWSERLESS_TOKEN:-browseless-local-token}
      PORT: 4000
    depends_on:
      - browseless
    restart: unless-stopped
